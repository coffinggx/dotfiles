backend = "xrender";
vsync = true;

# # Window transparency
 inactive-opacity= 1;
 active-opacity = 1;
 frame-opacity = 0.9;
#
# # No ugly shadows on borders
shadow = true;
shadow-radius = 8;
shadow-opacity = 0.25;
shadow-offset-x = 0;
shadow-offset-y = 0;

# # Rounded corners (optional but 🔥)
# corner-radius = 8;
 rounded-corners-exclude = [
   "window_type = 'dock'",
   "window_type = 'desktop'"
 ];
#
# # Blur behind transparent borders
blur-method = "dual_kawase";
blur-strength = 6;
blur-background = true;
use-damage = true;
unredir-if-possible = true;

detect-client-opacity =false;
detect-rounded-corners = true;
detect-transient = true;

shadow = false;
fading =true;
fade-in-step = 0.04;
fade-out-step = 0.04;
fade-delta = 8;

corner-radius = 0;
round-borders = 0;
