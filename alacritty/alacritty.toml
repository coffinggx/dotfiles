[general]
import = [
    "~/.config/alacritty/themes/themes/github_dark_high_contrast.toml"
]
[font]
size = 10.0

[font.bold]
family = "JetBrains Mono"
style = "Bold"

[font.glyph_offset]
x = 0
y = 0

[font.italic]
family = "JetBrains Mono"
style = "Italic"

[font.normal]
family = "JetBrains Mono"
style = "Regular"

[font.offset]
x = 0
y = 0

[selection]
save_to_clipboard = true

[window]
opacity = 1

[window.padding]
x = 0
y = 0
